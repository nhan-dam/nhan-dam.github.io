site_name: ND's Machine Learning Notes
site_description: Nhan Dam's Technical Notes on Machine Learning.
site_author: Nhan Dam
site_url: https://nhan-dam.github.io

repo_name: nhan-dam/nhan-dam.github.io
repo_url: https://github.com/nhan-dam/nhan-dam.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - RLHF Curriculum:
    # - Overview: rlhf/index.md
    # - Week 1 – MDPs & Bellman Equations: rlhf/week1-mdp.md
    # - Week 2 – Policy Gradients & PPO: rlhf/week2-ppo.md
    - DLAI Course:
      - Overview: rlhf/dlai/index.md
      - Lecture 1 - Conceptual Overview: rlhf/dlai/DLAI_Lecture1.md
      - Lecture 2 - Datasets: rlhf/dlai/DLAI_Lecture2.md
      - Lecture 3 - Tune an LLM with RLHF: rlhf/dlai/DLAI_Lecture3.md
      - Lecture 4 - Evaluate an RLHF-Tuned Model: rlhf/dlai/DLAI_Lecture4.md
  # - Projects:
  #   - Overview: projects/index.md
  #   - CartPole with PPO: projects/cartpole-ppo.md
  - Reference:
    - Mac ML Workstation Setup: reference/ml_workstation_setup_uv.md
    - GitHub Pages Setup: reference/github-pages-setup.md
    - GitHub Task-Oriented Cheatsheet: reference/github_cheatsheet_chapter.md
